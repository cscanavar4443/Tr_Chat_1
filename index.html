<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CYBER-CORE V17 | OMNI</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>

<body class="bg-black text-white overflow-hidden">

<!-- LOGIN -->

<div id="auth-screen" class="fixed inset-0 bg-black z-50 flex items-center justify-center p-4">

<div class="bg-[#0a0a0a] border border-white/10 p-8 rounded-2xl w-full max-w-md shadow-2xl">

<h2 class="text-2xl font-black mb-6 text-center italic">
CYBER-CORE <span class="text-indigo-500">V17</span>
</h2>

<div class="space-y-4">

<input id="auth-email" type="email" placeholder="E-posta"
class="w-full bg-[#111] border border-white/10 p-3 rounded-lg outline-none focus:border-indigo-500">

<input id="auth-user" type="text" placeholder="Kullanıcı adı"
class="w-full bg-[#111] border border-white/10 p-3 rounded-lg outline-none focus:border-indigo-500">

<input id="auth-pass" type="password" placeholder="Şifre"
class="w-full bg-[#111] border border-white/10 p-3 rounded-lg outline-none focus:border-indigo-500">

<button onclick="handleAuth()" 
class="w-full bg-indigo-600 py-3 rounded-lg font-bold hover:bg-indigo-500 transition">
GİRİŞ YAP / KAYIT OL
</button>

</div>
</div>
</div>

<!-- BAN SCREEN -->

<div id="BAN-SCREEN" class="hidden fixed inset-0 bg-black flex flex-col items-center justify-center">

<h1 class="text-8xl mb-6">☣️</h1>

<h2 class="text-4xl font-black text-red-600">
SİSTEMDEN MEN EDİLDİN
</h2>

<p id="ban-reason" class="text-gray-500 mt-4 font-mono">
Güvenlik ihlali
</p>

</div>


<div class="flex h-screen">

<!-- SIDEBAR -->

<aside class="w-64 bg-[#0b0b0b] border-r border-white/10 flex flex-col">

<div class="p-6">

<h1 class="text-xl font-black">
V17 <span class="text-indigo-500">OMNI</span>
</h1>

<div id="voice-status" class="text-xs text-gray-400 mt-2">
⚪ Sesli: bağlı değil
</div>

</div>

<div class="flex-1 overflow-y-auto px-4">

<p class="text-xs text-gray-500 mb-2">
KANALLAR
</p>

<div id="room-list" class="space-y-1"></div>

<button onclick="createRoom()" 
class="mt-2 text-xs text-indigo-400 hover:text-indigo-300">
+ Oda oluştur
</button>

<p class="text-xs text-gray-500 mt-6 mb-2">
AKTİF KULLANICILAR
</p>

<div id="user-list" class="space-y-2 text-xs"></div>

</div>

<div class="p-4 border-t border-white/10">

<div class="flex items-center gap-3">

<div id="my-avatar"
class="w-9 h-9 rounded-full bg-indigo-600 flex items-center justify-center font-bold">
?
</div>

<div>

<p id="my-name-display" class="text-sm font-bold">
...
</p>

<p id="my-role-display" class="text-xs text-gray-400">
yükleniyor
</p>

</div>

</div>
</div>

</aside>


<!-- CHAT -->

<main class="flex-1 flex flex-col">

<header class="h-14 flex items-center justify-between px-6 border-b border-white/10">

<h3 id="active-room-name" class="font-bold text-gray-300">
# genel
</h3>

<div class="flex gap-3">

<button onclick="joinVoice()" class="text-sm text-indigo-400">
🔊 Sese katıl
</button>

<div id="root-tag" class="hidden text-xs bg-red-600 px-2 py-1 rounded">
OVERLORD
</div>

</div>

</header>


<!-- MESSAGES -->

<div id="messages" class="flex-1 overflow-y-auto p-6 space-y-3"></div>

<div id="typing-indicator" class="text-xs text-gray-500 px-6"></div>


<!-- INPUT -->

<div class="p-6">

<div class="max-w-4xl mx-auto flex gap-3">

<input id="msg-input" type="text"

placeholder="Mesaj gönder... (**bold**, *italic*, `code`)"

class="flex-1 bg-[#111] border border-white/10 p-3 rounded-lg outline-none focus:border-indigo-500">

<button onclick="uiSend()"

class="bg-indigo-600 px-6 rounded-lg font-bold hover:bg-indigo-500">

Gönder

</button>

</div>

</div>

</main>

</div>


<script src="app.js"></script>

</body>
</html>
