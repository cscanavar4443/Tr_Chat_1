<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CYBER-CHAT | V18.2 CLASSIC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="auth-screen" class="overlay">
        <div class="auth-box">
            <h2>SİSTEME GİRİŞ</h2>
            <input id="auth-email" type="email" placeholder="E-posta">
            <input id="auth-user" type="text" placeholder="Kullanıcı Adı">
            <input id="auth-pass" type="password" placeholder="Şifre">
            <button onclick="handleAuth()">SİSTEMİ BAŞLAT</button>
        </div>
    </div>

    <div id="BAN-SCREEN" class="overlay" style="display:none; color:red;">
        <h1>ERİŞİM REDDEDİLDİ</h1>
        <p>GÜVENLİK PROTOKOLÜ AKTİF.</p>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">CYBER-CHAT</div>
            <div class="label">ODALAR</div>
            <div id="room-list"></div>
            <button class="add-room" onclick="createRoom()">+ ODA EKLE</button>
        </aside>

        <main class="chat-area">
            <div id="messages"></div>
            <div class="input-container">
                <input id="msg-input" type="text" placeholder="Mesajınızı buraya yazın...">
                <button onclick="uiSend()">GÖNDER</button>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
