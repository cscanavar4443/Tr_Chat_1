<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tr_Chat | V6 Ultimate</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f1113; color: #e2e8f0; }
        .glass { background: rgba(30, 32, 38, 0.8); backdrop-filter: blur(10px); }
        .msg-hover:hover .tools { opacity: 1; }
        .ban-overlay { position: fixed; inset: 0; background: black; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <div id="ban-screen" class="ban-overlay">
        <h1 class="text-9xl">🚫</h1>
        <h2 class="text-4xl font-bold text-red-600 mt-5">BANLANDIN</h2>
        <p class="text-gray-400 mt-2">Kurallara uymadığın için erişimin kesildi.</p>
    </div>

    <aside class="w-64 bg-[#121417] flex flex-col border-r border-white/5">
        <div class="p-4 border-b border-white/5 flex justify-between items-center bg-[#0a0b0d]">
            <h1 class="font-bold text-indigo-500">TR_CHAT V6</h1>
            <button onclick="addRoom()" class="bg-indigo-600 hover:bg-indigo-500 w-8 h-8 rounded-lg text-white font-bold transition-all">+</button>
        </div>
        
        <div id="room-container" class="flex-1 overflow-y-auto p-2 space-y-1">
            </div>

        <div class="p-4 bg-[#0a0b0d] border-t border-white/5 flex items-center gap-3">
            <div id="my-avatar" class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center font-bold text-white">?</div>
            <div class="overflow-hidden">
                <div id="display-name" class="text-sm font-bold truncate">Yükleniyor...</div>
                <div id="display-role" class="text-[10px] text-gray-500 font-bold uppercase italic tracking-widest">Üye</div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-[#16191d]">
        <header class="h-14 flex items-center px-6 border-b border-white/5 glass justify-between">
            <div class="flex items-center gap-2">
                <span class="text-indigo-500 font-bold text-xl">#</span>
                <span id="active-room-title" class="font-bold">genel-sohbet</span>
            </div>
            <div id="typing-box" class="text-xs italic text-indigo-400"></div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

        <div class="p-4">
            <div class="max-w-5xl mx-auto bg-[#1e2227] rounded-2xl flex items-center p-2 border border-white/5 focus-within:border-indigo-500/50">
                <input type="text" id="msg-inp" placeholder="Mesajını buraya bırak..." class="bg-transparent flex-1 outline-none px-4 text-sm py-2">
                <button onclick="sendMsg()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-xl font-bold transition-all active:scale-95">Gönder</button>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBpCLRiS8pHlTgvVmNLH92u3VszvT25xPs",
            authDomain: "trchat-7bc26.firebaseapp.com",
            databaseURL: "https://trchat-7bc26-default-rtdb.firebaseio.com", 
            projectId: "trchat-7bc26"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // KULLANICI KİMLİĞİ
        const myUID = localStorage.getItem('v6_uid') || Math.random().toString(36).substring(7);
        localStorage.setItem('v6_uid', myUID);
        
        let myName = localStorage.getItem('v6_name');
        if(!myName) {
            myName = prompt("Kullanıcı Adın Nedir?") || "Anonim";
            localStorage.setItem('v6_name', myName);
        }

        const isAdmin = myName.toLowerCase() === "alper";
        let currentRoom = "genel";

        // UI BAŞLAT
        document.getElementById('display-name').innerText = myName;
        document.getElementById('my-avatar').innerText = myName[0].toUpperCase();
        if(isAdmin) {
            document.getElementById('display-role').innerText = "KURUCU";
            document.getElementById('display-role').classList.replace('text-gray-500', 'text-red-500');
        }

        // BAN KONTROLÜ
        db.ref(`bans/${myUID}`).on('value', snap => {
            if(snap.val()) document.getElementById('ban-screen').style.display = 'flex';
        });

        // ODA YÖNETİMİ
        function addRoom() {
            const rName = prompt("Yeni Oda Adı:");
            if(rName) db.ref('rooms').child(rName).set({ owner: myName });
        }

        db.ref('rooms').on('value', snap => {
            const cont = document.getElementById('room-container');
            cont.innerHTML = `<button onclick="switchRoom('genel')" class="w-full text-left p-2 rounded hover:bg-white/5 ${currentRoom==='genel'?'bg-indigo-600/20 text-indigo-400':''}"># genel</button>`;
            snap.forEach(r => {
                const name = r.key;
                cont.innerHTML += `
                    <div class="flex items-center justify-between group px-2 py-1 rounded hover:bg-white/5 ${currentRoom===name?'bg-indigo-600/20 text-indigo-400':''}">
                        <button onclick="switchRoom('${name}')" class="flex-1 text-left"># ${name}</button>
                        ${isAdmin || r.val().owner === myName ? `<button onclick="deleteRoom('${name}')" class="opacity-0 group-hover:opacity-100 text-xs text-red-500">Sil</button>` : ''}
                    </div>`;
            });
        });

        function switchRoom(n) {
            currentRoom = n;
            document.getElementById('active-room-title').innerText = n;
            loadMessages();
        }

        function deleteRoom(n) {
            if(confirm("Odayı ve mesajları silmek istiyor musun?")) {
                db.ref('rooms').child(n).remove();
                db.ref('msgs').child(n).remove();
                switchRoom('genel');
            }
        }

        // MESAJLAŞMA
        function sendMsg() {
            const inp = document.getElementById('msg-inp');
            if(!inp.value.trim()) return;
            db.ref('msgs').child(currentRoom).push({
                uid: myUID, name: myName, text: inp.value, ts: Date.now()
            });
            inp.value = '';
        }

        function loadMessages() {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            db.ref('msgs').child(currentRoom).off();
            db.ref('msgs').child(currentRoom).on('child_added', snap => {
                const m = snap.val();
                const mid = snap.key;
                const isMe = m.uid === myUID;
                
                const div = document.createElement('div');
                div.className = "flex gap-3 msg-hover relative group";
                div.innerHTML = `
                    <div class="w-10 h-10 rounded-lg bg-[#2b2d31] flex items-center justify-center font-bold text-indigo-400 border border-white/5">${m.name[0].toUpperCase()}</div>
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-sm ${m.name.toLowerCase()==='alper'?'text-red-500':'text-gray-200'}">${m.name}</span>
                            <span class="text-[10px] text-gray-600">${new Date(m.ts).toLocaleTimeString()}</span>
                        </div>
                        <p id="t-${mid}" class="text-gray-300 text-sm">${m.text}</p>
                    </div>
                    <div class="tools opacity-0 transition-opacity flex gap-2">
                        ${isMe ? `<button onclick="editMsg('${mid}')" class="text-[10px] text-indigo-400 hover:underline">Düzenle</button>` : ''}
                        ${isAdmin ? `<button onclick="banUser('${m.uid}')" class="text-[10px] text-red-500 hover:underline">Ban</button>` : ''}
                        ${isAdmin || isMe ? `<button onclick="deleteMsg('${mid}')" class="text-[10px] text-red-500 hover:underline">Sil</button>` : ''}
                    </div>
                `;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            });
        }

        function deleteMsg(mid) {
            db.ref('msgs').child(currentRoom).child(mid).remove();
            loadMessages();
        }

        function editMsg(mid) {
            const oldText = document.getElementById(`t-${mid}`).innerText;
            const newText = prompt("Mesajı düzenle:", oldText);
            if(newText) db.ref('msgs').child(currentRoom).child(mid).update({ text: newText });
            loadMessages();
        }

        function banUser(uid) {
            if(confirm("Bu kullanıcıyı kalıcı olarak banlamak istiyor musun?")) {
                db.ref('bans').child(uid).set(true);
            }
        }

        loadMessages();
        document.getElementById('msg-inp').addEventListener('keypress', e => { if(e.key==='Enter') sendMsg(); });
    </script>
</body>
</html>
