<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium TR-Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
    <aside class="sidebar">
        <div class="server-header">TR-CHAT CLONE</div>
        <div class="channel-list" id="channelList">
            <div class="channel active" onclick="switchChannel('genel')"># genel</div>
            </div>
        <div class="user-panel">
            <div class="user-info">
                <span id="myNickDisplay">Yükleniyor...</span>
                <button onclick="openSettings()"><i class="fas fa-cog"></i></button>
            </div>
        </div>
    </aside>

    <main class="chat-area">
        <header class="chat-header">
            <span id="currentChannelName"># genel</span>
            <div class="header-tools">
                <button onclick="createRoom()" title="Oda Oluştur"><i class="fas fa-plus"></i></button>
            </div>
        </header>
        <div id="messages"></div>
        <div class="input-wrapper">
            <input type="text" id="msgInput" placeholder="Mesaj gönder...">
        </div>
    </main>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>Profil Ayarları</h3>
        <input type="text" id="newNick" placeholder="Yeni Nickname">
        <button onclick="saveSettings()">Kaydet</button>
        <button onclick="closeSettings()" class="close">Kapat</button>
    </div>
</div>
    <div class="chat-wrapper">
        <header>
            <h3><i class="fas fa-comments"></i> TR-Chat Premium</h3>
            <span id="status-dot"></span>
        </header>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="username" placeholder="Nick..." maxlength="15">
            <input type="text" id="messageInput" placeholder="Bir şeyler yazın...">
            <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
