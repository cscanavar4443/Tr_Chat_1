<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CYBER-CORE V19 | PREMIUM</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="auth-screen" class="gate-overlay">
        <div class="premium-box">
            <h1 class="neon-text">CYBER-CORE</h1>
            <div class="input-group">
                <input id="auth-email" type="email" placeholder="E-POSTA">
                <input id="auth-user" type="text" placeholder="KULLANICI ADI">
                <input id="auth-pass" type="password" placeholder="ŞİFRE">
            </div>
            <button onclick="handleAuth()" class="neon-btn">ERİŞİM SAĞLA</button>
        </div>
    </div>

    <div id="BAN-SCREEN" class="gate-overlay" style="display:none;">
        <div class="premium-box border-red">
            <h1 class="red-neon">SİSTEMDEN MEN EDİLDİN</h1>
            <p id="ban-reason">PROTOKOL İHLALİ</p>
        </div>
    </div>

    <div class="app-layout">
        <aside class="side-panel">
            <div class="panel-brand">V19 <span class="dot">.</span></div>
            <div class="nav-label">KANALLAR</div>
            <div id="room-list" class="room-nav"></div>
            <button class="create-room-btn" onclick="createRoom()">+ YENİ KANAL</button>
        </aside>

        <main class="chat-main">
            <header class="chat-top">
                <span id="active-room-name"># genel</span>
                <div class="status-indicator">SİSTEM AKTİF</div>
            </header>

            <div id="messages" class="scroll-v"></div>

            <div class="chat-bottom">
                <div class="input-wrap">
                    <input id="msg-input" type="text" placeholder="Komut veya mesaj girin...">
                    <button onclick="uiSend()" class="send-icon">▲</button>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
