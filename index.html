<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TR_CHAT | V6 ULTIMATE ELITE SECURE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --p-indigo: #6366f1; --p-red: #ef4444; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #080a0c; color: #e2e8f0; margin: 0; }
        
        /* Premium Cam Efekti */
        .glass { background: rgba(15, 18, 22, 0.85); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.03); }
        .sidebar { background: #0b0d10; border-right: 1px solid rgba(255,255,255,0.02); }
        
        /* Mesaj Balonları */
        .msg-bubble { 
            background: rgba(30, 35, 43, 0.5); 
            border: 1px solid rgba(255,255,255,0.03); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .msg-bubble:hover { 
            background: rgba(40, 45, 55, 0.8); 
            border-color: var(--p-indigo);
            transform: scale(1.01) translateX(8px);
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.6);
        }
        
        /* Oda Butonları */
        .room-item { transition: all 0.3s; border-radius: 14px; cursor: pointer; border: 1px solid transparent; }
        .room-item:hover { background: rgba(99, 102, 241, 0.05); color: white; }
        .room-active { background: linear-gradient(90deg, rgba(99, 102, 241, 0.15), transparent) !important; border-left: 4px solid var(--p-indigo) !important; color: white !important; }

        /* Animasyonlar */
        @keyframes msgSlide { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .animate-msg { animation: msgSlide 0.4s ease-out forwards; }
        
        /* Güvenlik Katmanı */
        .ban-screen { position: fixed; inset: 0; background: radial-gradient(circle, #1a0505 0%, #000 100%); z-index: 99999; display: none; align-items: center; justify-content: center; flex-direction: column; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--p-indigo); border-radius: 10px; }
        .admin-glow { text-shadow: 0 0 12px rgba(239, 68, 68, 0.6); }
    </style>
</head>
<body class="h-screen flex overflow-hidden select-none">

    <div id="ban-screen" class="ban-screen">
        <div class="text-9xl animate-bounce">🛡️</div>
        <h1 class="text-6xl font-black text-white mt-8 tracking-tighter">ERİŞİM REDDEDİLDİ</h1>
        <p class="text-red-500 font-bold mt-4 tracking-widest uppercase">Güvenlik ihlali veya yasaklama tespit edildi.</p>
    </div>

    <aside class="w-80 sidebar flex flex-col">
        <div class="p-8 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-white">TR_CHAT <span class="text-indigo-500">V6</span></h1>
                <p class="text-[9px] text-gray-600 font-bold tracking-[4px] uppercase mt-1">Ultimate Secure</p>
            </div>
            <button onclick="addRoom()" class="w-10 h-10 bg-indigo-600/10 hover:bg-indigo-600 text-white rounded-xl transition-all shadow-lg">+</button>
        </div>

        <div class="flex-1 overflow-y-auto px-4 space-y-1">
            <p class="text-[10px] font-black text-gray-700 uppercase tracking-widest mb-4 px-4">Kanallar (Silmek için çift tıkla)</p>
            <div id="room-container"></div>
        </div>

        <div class="p-6 border-t border-white/5 bg-black/30">
            <div onclick="changeMyName()" class="flex items-center gap-4 p-3 rounded-2xl hover:bg-white/5 cursor-pointer transition-all group">
                <div id="my-avatar" class="w-12 h-12 rounded-2xl bg-indigo-600 flex items-center justify-center font-bold text-white shadow-xl shadow-indigo-600/20">?</div>
                <div class="flex-1 overflow-hidden">
                    <div id="display-name" class="text-sm font-bold text-white truncate">Yükleniyor...</div>
                    <div id="display-role" class="text-[9px] text-gray-500 font-black tracking-widest uppercase">Üye</div>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-[#0d0f13]">
        <header class="h-20 flex items-center px-10 glass justify-between z-10">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-indigo-500/10 rounded-xl flex items-center justify-center text-indigo-500 font-bold">#</div>
                <div>
                    <h2 id="active-room-title" class="text-lg font-bold text-white">genel-sohbet</h2>
                    <p class="text-[10px] text-green-500 font-bold">Uçtan uca şifreli ve güvenli</p>
                </div>
            </div>
            <div class="flex gap-4">
                <div id="typing-box" class="text-xs italic text-indigo-400"></div>
            </div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-10 space-y-8 scroll-smooth"></div>

        <div class="p-8">
            <div class="max-w-5xl mx-auto bg-[#161a20] rounded-3xl flex items-center p-2 border border-white/5 shadow-2xl focus-within:border-indigo-500/50 transition-all">
                <input type="text" id="msg-inp" placeholder="Buraya bir mesaj bırak... (Silmek için mesaja çift tıkla)" class="bg-transparent flex-1 outline-none px-6 text-sm py-4 text-white">
                <button onclick="sendMsg()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-10 py-4 rounded-2xl font-bold shadow-lg shadow-indigo-600/20 transition-all active:scale-95">GÖNDER</button>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBpCLRiS8pHlTgvVmNLH92u3VszvT25xPs",
            authDomain: "trchat-7bc26.firebaseapp.com",
            databaseURL: "https://trchat-7bc26-default-rtdb.firebaseio.com", 
            projectId: "trchat-7bc26"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- ÜST DÜZEY GÜVENLİK (SECURE SHIELD) ---
        function sanitize(text) {
            if (!text) return "";
            const temp = document.createElement('div');
            temp.textContent = text; // HTML kodlarını düz metne çevirir
            return temp.innerHTML;
        }

        const myUID = localStorage.getItem('v6_uid_secure') || 'USR-' + Math.random().toString(36).substring(2, 15);
        localStorage.setItem('v6_uid_secure', myUID);
        let myName = localStorage.getItem('v6_name') || "Anonim_" + Math.floor(Math.random()*999);
        let currentRoom = "genel";

        function updateProfileUI() {
            const isAdmin = myName.toLowerCase() === "alper";
            document.getElementById('display-name').innerText = myName;
            document.getElementById('my-avatar').innerText = myName[0].toUpperCase();
            const roleEl = document.getElementById('display-role');
            if(isAdmin) {
                roleEl.innerText = "KURUCU";
                roleEl.className = "text-[9px] text-red-500 font-black tracking-widest admin-glow";
            }
            return isAdmin;
        }

        function changeMyName() {
            const n = prompt("Yeni kullanıcı adın (Zararlı kodlar temizlenir):", myName);
            if(n && n.trim().length > 1) {
                myName = sanitize(n.trim());
                localStorage.setItem('v6_name', myName);
                location.reload();
            }
        }

        // BAN SİSTEMİ
        db.ref(`bans/${myUID}`).on('value', snap => {
            if(snap.val()) document.getElementById('ban-screen').style.display = 'flex';
        });

        // ODA YÖNETİMİ
        function addRoom() {
            const n = prompt("Oda İsmi:");
            if(n) {
                const safeName = sanitize(n).replace(/\s+/g, '-').toLowerCase();
                db.ref('rooms').child(safeName).set({ owner: myName, ownerUID: myUID });
            }
        }

        // --- ÇİFT TIKLAMA İLE ODA SİLME ---
        function handleRoomDblClick(name, oUID) {
            const isAdmin = myName.toLowerCase() === "alper";
            if(isAdmin || oUID === myUID) {
                if(confirm(`#${name} odasını ve tüm mesajları kökten silmek istiyor musun?`)) {
                    db.ref('rooms').child(name).remove();
                    db.ref('msgs').child(name).remove();
                    if(currentRoom === name) switchRoom('genel');
                }
            }
        }

        db.ref('rooms').on('value', snap => {
            const cont = document.getElementById('room-container');
            cont.innerHTML = `
                <div onclick="switchRoom('genel')" class="room-item p-4 mb-1 font-bold text-sm text-gray-400 ${currentRoom==='genel'?'room-active':''}">
                    <span class="opacity-30 mr-2 text-lg">#</span> genel-sohbet
                </div>`;
            snap.forEach(r => {
                const name = r.key;
                const d = r.val();
                cont.innerHTML += `
                    <div onclick="switchRoom('${name}')" 
                         ondblclick="handleRoomDblClick('${name}', '${d.ownerUID}')"
                         class="room-item p-4 mb-1 font-bold text-sm text-gray-400 flex justify-between items-center ${currentRoom===name?'room-active':''}">
                        <div><span class="opacity-30 mr-2 text-lg">#</span> ${name}</div>
                    </div>`;
            });
        });

        function switchRoom(n) {
            currentRoom = n;
            document.getElementById('active-room-title').innerText = n;
            loadMessages();
        }

        // MESAJ İŞLEMLERİ
        function sendMsg() {
            const inp = document.getElementById('msg-inp');
            const val = inp.value.trim();
            if(!val) return;
            
            db.ref('msgs').child(currentRoom).push({
                uid: myUID, 
                name: myName, 
                text: sanitize(val), // Mesajı süzgeçten geçiriyoruz
                ts: Date.now(),
                role: myName.toLowerCase() === 'alper' ? 'admin' : 'user'
            });
            inp.value = '';
        }

        // --- ÇİFT TIKLAMA İLE MESAJ SİLME ---
        function handleMsgDblClick(mid, sUID) {
            const isAdmin = myName.toLowerCase() === "alper";
            if(isAdmin || sUID === myUID) {
                if(confirm("Bu mesajı silmek istediğine emin misin?")) {
                    db.ref('msgs').child(currentRoom).child(mid).remove();
                    loadMessages();
                }
            }
        }

        function banUser(uid, targetName) {
            if(confirm(`${targetName} adlı kullanıcıyı kalıcı olarak banlamak istiyor musun?`)) {
                db.ref('bans').child(uid).set(true);
            }
        }

        function loadMessages() {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            db.ref('msgs').child(currentRoom).off();
            db.ref('msgs').child(currentRoom).on('child_added', snap => {
                const m = snap.val();
                const mid = snap.key;
                const isAdminMe = myName.toLowerCase() === "alper";

                const div = document.createElement('div');
                div.className = "flex gap-5 animate-msg group";
                div.innerHTML = `
                    <div class="w-14 h-14 rounded-2xl bg-[#1a1e24] flex-shrink-0 flex items-center justify-center font-bold text-indigo-400 border border-white/5 text-xl shadow-inner">
                        ${m.name[0].toUpperCase()}
                    </div>
                    <div class="flex-1 space-y-2">
                        <div class="flex items-center gap-3">
                            <span class="font-bold text-sm ${m.role==='admin'?'text-red-500 admin-glow':'text-indigo-300'}">${m.name}</span>
                            <span class="text-[10px] text-gray-700 font-bold">${new Date(m.ts).toLocaleTimeString()}</span>
                            ${m.role === 'admin' ? '<span class="text-[8px] bg-red-500/10 text-red-500 px-2 py-0.5 rounded-full font-black border border-red-500/20">KURUCU</span>' : ''}
                        </div>
                        <div class="msg-bubble p-5 rounded-3xl rounded-tl-none relative shadow-sm" 
                             ondblclick="handleMsgDblClick('${mid}', '${m.uid}')">
                            <p class="text-gray-300 text-sm leading-relaxed">${m.text}</p>
                            
                            ${isAdminMe && m.uid !== myUID ? `
                                <button onclick="banUser('${m.uid}', '${m.name}')" class="absolute -right-12 top-2 opacity-0 group-hover:opacity-100 p-2 bg-red-500/10 text-red-500 rounded-lg hover:bg-red-500 hover:text-white transition-all">🚫</button>
                            ` : ''}
                        </div>
                    </div>
                `;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            });
        }

        updateProfileUI();
        loadMessages();
        document.getElementById('msg-inp').addEventListener('keypress', e => { if(e.key==='Enter') sendMsg(); });
    </script>
</body>
</html>
