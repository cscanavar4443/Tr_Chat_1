<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TR_CHAT | V6 CYBER FORTRESS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --neon-indigo: #6366f1; --neon-red: #ff0033; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050608; color: #e2e8f0; overflow: hidden; }
        
        .cyber-panel { background: rgba(10, 12, 16, 0.9); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.02); }
        .sidebar { background: #08090b; border-right: 1px solid rgba(255,255,255,0.03); }
        
        .msg-bubble { 
            background: rgba(22, 26, 32, 0.6); 
            border: 1px solid rgba(255,255,255,0.03); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .msg-bubble:hover { 
            border-color: var(--neon-indigo);
            background: rgba(30, 35, 45, 0.9);
            transform: scale(1.005) translateX(5px);
        }

        .ban-screen { 
            position: fixed; inset: 0; background: #000; z-index: 99999; display: none; 
            align-items: center; justify-content: center; flex-direction: column;
            background: radial-gradient(circle, #200505 0%, #000 100%);
        }

        .admin-btn { background: linear-gradient(45deg, #4f46e5, #818cf8); box-shadow: 0 0 20px rgba(79, 70, 229, 0.3); }
        
        @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: 0%; } }
        .scanline { position: absolute; width: 100%; height: 2px; background: rgba(99, 102, 241, 0.1); animation: scanline 6s linear infinite; pointer-events: none; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-indigo); }
    </style>
</head>
<body class="h-screen flex select-none" oncontextmenu="return false;">

    <div class="scanline"></div>

    <div id="ban-screen" class="ban-screen">
        <div class="text-9xl mb-8">🛡️</div>
        <h1 class="text-6xl font-black text-white tracking-tighter">SİSTEMDEN ATILDIN</h1>
        <p class="text-red-500 font-mono mt-4 text-xl tracking-[10px] uppercase">Güvenlik İhlali: IP_BANNED</p>
    </div>

    <aside class="w-80 sidebar flex flex-col z-20">
        <div class="p-8 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter text-white">TR_CHAT <span class="text-indigo-500">V6</span></h1>
            <button onclick="addRoom()" class="w-10 h-10 bg-indigo-600/10 hover:bg-indigo-600 text-white rounded-xl transition-all">+</button>
        </div>

        <div class="flex-1 overflow-y-auto px-4 space-y-1">
            <p class="text-[10px] font-black text-gray-700 uppercase tracking-widest mb-4 px-4">Kanallar</p>
            <div id="room-container"></div>
        </div>

        <div class="p-6 border-t border-white/5 bg-black/40">
            <div onclick="changeMyName()" class="flex items-center gap-4 p-3 rounded-2xl hover:bg-white/5 cursor-pointer">
                <div id="my-avatar" class="w-12 h-12 rounded-2xl bg-indigo-600 flex items-center justify-center font-bold text-white shadow-xl">?</div>
                <div class="flex-1 overflow-hidden">
                    <div id="display-name" class="text-sm font-bold text-white truncate">...</div>
                    <div id="display-role" class="text-[9px] text-gray-500 font-black uppercase tracking-widest">Bağlanıyor</div>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="h-20 flex items-center px-10 cyber-panel justify-between z-10">
            <div class="flex items-center gap-4">
                <span class="text-indigo-500 font-black text-2xl">#</span>
                <h2 id="active-room-title" class="text-lg font-bold text-white">genel-sohbet</h2>
            </div>
            
            <div id="admin-tools" class="hidden flex gap-2">
                <button onclick="showBanList()" class="admin-btn px-4 py-2 rounded-lg text-xs font-bold text-white">BAN LİSTESİ</button>
            </div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-10 space-y-8"></div>

        <div class="p-8 bg-gradient-to-t from-black/50 to-transparent">
            <div class="max-w-5xl mx-auto bg-[#11141b] rounded-2xl flex items-center p-2 border border-white/5 shadow-2xl focus-within:border-indigo-500/50">
                <input type="text" id="msg-inp" autocomplete="off" placeholder="Mesajını buraya kodlamadan yaz..." class="bg-transparent flex-1 outline-none px-6 text-sm py-4 text-white">
                <button onclick="sendMsg()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-10 py-4 rounded-xl font-bold transition-all active:scale-95">GÖNDER</button>
            </div>
        </div>
    </main>

    <script>
        // --- F12 VE GÜVENLİK KORUMASI ---
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; // F12
            if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Source code
        };

        const firebaseConfig = {
            apiKey: "AIzaSyBpCLRiS8pHlTgvVmNLH92u3VszvT25xPs",
            authDomain: "trchat-7bc26.firebaseapp.com",
            databaseURL: "https://trchat-7bc26-default-rtdb.firebaseio.com", 
            projectId: "trchat-7bc26"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- XSS VE SALDIRI KALKANI ---
        function sanitize(text) {
            if (!text) return "";
            let clean = text.replace(/<[^>]*>?/gm, ''); // Tüm HTML'leri sil
            const div = document.createElement('div');
            div.textContent = clean;
            return div.innerHTML;
        }

        // IP TABANLI BAN KİMLİĞİ (Fingerprint)
        const myIP_ID = localStorage.getItem('v6_fingerprint') || 'FP-' + Math.random().toString(36).substring(2, 20);
        localStorage.setItem('v6_fingerprint', myIP_ID);
        
        let myName = localStorage.getItem('v6_name') || "Üye";
        let currentRoom = "genel";

        function checkAdmin() {
            const isAdmin = myName.toLowerCase() === "alper";
            if(isAdmin) document.getElementById('admin-tools').classList.remove('hidden');
            return isAdmin;
        }

        // BAN KONTROLÜ
        db.ref(`bans/${myIP_ID}`).on('value', snap => {
            if(snap.val()) document.getElementById('ban-screen').style.display = 'flex';
        });

        // ODA YÖNETİMİ
        function addRoom() {
            const n = prompt("Oda İsmi:");
            if(n) {
                const id = sanitize(n).replace(/\s+/g, '-').toLowerCase();
                db.ref('rooms').child(id).set({ creator: myName, creatorIP: myIP_ID });
            }
        }

        db.ref('rooms').on('value', snap => {
            const cont = document.getElementById('room-container');
            cont.innerHTML = `<div onclick="switchRoom('genel')" class="p-4 rounded-xl cursor-pointer ${currentRoom==='genel'?'bg-indigo-600/20 text-white border-l-4 border-indigo-600':''}"># genel-sohbet</div>`;
            snap.forEach(r => {
                const name = r.key;
                cont.innerHTML += `<div onclick="switchRoom('${name}')" ondblclick="deleteRoom('${name}', '${r.val().creatorIP}')" class="p-4 rounded-xl hover:bg-white/5 cursor-pointer ${currentRoom===name?'bg-indigo-600/20 text-white border-l-4 border-indigo-600':''}"># ${name}</div>`;
            });
        });

        function deleteRoom(name, cIP) {
            if(checkAdmin() || cIP === myIP_ID) {
                if(confirm("Odayı yok et?")) { db.ref('rooms').child(name).remove(); db.ref('msgs').child(name).remove(); }
            }
        }

        function switchRoom(n) { currentRoom = n; document.getElementById('active-room-title').innerText = n; loadMessages(); }

        // MESAJLAŞMA
        function sendMsg() {
            const inp = document.getElementById('msg-inp');
            if(!inp.value.trim()) return;
            db.ref('msgs').child(currentRoom).push({
                ip: myIP_ID, name: myName, text: sanitize(inp.value), ts: Date.now(),
                role: checkAdmin() ? 'admin' : 'user'
            });
            inp.value = '';
        }

        // BAN LİSTESİ VE GERİ ALMA
        function showBanList() {
            db.ref('bans').once('value', snap => {
                let list = "BANLI KULLANICILAR:\n";
                snap.forEach(b => { list += `- ${b.key}\n`; });
                const toUnban = prompt(list + "\nBanını kaldırmak istediğin IP ID'sini yaz:");
                if(toUnban) db.ref('bans').child(toUnban).remove();
            });
        }

        function handleMsgDblClick(mid, sIP) {
            if(checkAdmin() || sIP === myIP_ID) {
                if(confirm("Bu mesajı silsin mi?")) db.ref('msgs').child(currentRoom).child(mid).remove();
            }
        }

        function banUser(ip) {
            if(checkAdmin() && confirm("Bu IP'yi sonsuza dek yasakla?")) db.ref('bans').child(ip).set(true);
        }

        function loadMessages() {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            db.ref('msgs').child(currentRoom).off();
            db.ref('msgs').child(currentRoom).on('child_added', snap => {
                const m = snap.val();
                const div = document.createElement('div');
                div.className = "flex gap-5 animate-msg group";
                div.innerHTML = `
                    <div class="w-14 h-14 rounded-2xl bg-[#11141b] flex items-center justify-center font-bold text-indigo-400 border border-white/5">${m.name[0].toUpperCase()}</div>
                    <div class="flex-1 space-y-1">
                        <div class="flex items-center gap-3">
                            <span class="font-bold text-sm ${m.role==='admin'?'text-red-500':'text-indigo-300'}">${m.name}</span>
                            <span class="text-[9px] text-gray-700">${new Date(m.ts).toLocaleTimeString()}</span>
                        </div>
                        <div class="msg-bubble p-5 rounded-3xl rounded-tl-none" ondblclick="handleMsgDblClick('${snap.key}', '${m.ip}')">
                            <p class="text-gray-300 text-sm">${m.text}</p>
                            ${checkAdmin() && m.ip !== myIP_ID ? `<button onclick="banUser('${m.ip}')" class="absolute -right-10 top-2 opacity-0 group-hover:opacity-100 text-red-600">🚫</button>` : ''}
                        </div>
                    </div>`;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            });
        }

        function changeMyName() {
            const n = prompt("Yeni İsim:");
            if(n) { localStorage.setItem('v6_name', sanitize(n)); location.reload(); }
        }

        document.getElementById('display-name').innerText = myName;
        document.getElementById('my-avatar').innerText = myName[0].toUpperCase();
        document.getElementById('display-role').innerText = checkAdmin() ? "KURUCU" : "AKTİF ÜYE";

        loadMessages();
        document.getElementById('msg-inp').addEventListener('keypress', e => { if(e.key==='Enter') sendMsg(); });
    </script>
</body>
</html>
