<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CYBER CORE CHAT</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>

<body>

<!-- LOGIN -->

<div id="auth-screen">

<div class="login-card">

<h2>CYBER CORE</h2>

<input id="auth-email" placeholder="email">
<input id="auth-user" placeholder="kullanıcı adı">
<input id="auth-pass" type="password" placeholder="şifre">

<button onclick="handleAuth()">Giriş</button>

</div>

</div>

<!-- CHAT -->

<div id="chat-app">

<aside class="sidebar">

<div class="logo">CYBER</div>

<div id="room-list">

<div class="room-item active" onclick="switchRoom('genel')">
# genel
</div>

</div>

</aside>

<main>

<div class="chat-header">
# <span id="active-room">genel</span>
</div>

<div id="messages"></div>

<div class="input-area">

<input id="msg-input" placeholder="mesaj yaz">

<button onclick="sendMsg()">Gönder</button>

</div>

</main>

</div>

<script src="app.js"></script>

</body>
</html>
