<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TR_CHAT | V6 ULTIMATE ELITE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b0d0f; color: #e2e8f0; }
        .glass-header { background: rgba(22, 25, 30, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.03); }
        .sidebar { background: #0d0f12; border-right: 1px solid rgba(255,255,255,0.03); }
        .chat-bg { background: #121519; background-image: radial-gradient(circle at top right, rgba(79, 70, 229, 0.05), transparent); }
        
        .msg-bubble { 
            background: #1a1d23; 
            border: 1px solid rgba(255,255,255,0.03); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
        }
        .msg-bubble:hover { 
            background: #21252d; 
            border-color: rgba(79, 70, 229, 0.3);
            transform: translateX(5px);
            box-shadow: 0 10px 20px -10px rgba(0,0,0,0.5);
        }
        
        .room-btn { transition: all 0.2s; border-radius: 12px; margin: 2px 0; }
        .active-room { background: linear-gradient(90deg, rgba(79, 70, 229, 0.2), transparent); border-left: 4px solid #4f46e5; color: white !important; }
        
        .admin-tag { background: linear-gradient(45deg, #ef4444, #f87171); box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        .ban-overlay { position: fixed; inset: 0; background: #000; z-index: 99999; display: none; align-items: center; justify-content: center; text-align: center; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .animate-msg { animation: slideIn 0.3s ease forwards; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex overflow-hidden select-none">

    <div id="ban-screen" class="ban-overlay flex-col">
        <div class="text-8xl mb-6">🚫</div>
        <h1 class="text-5xl font-black text-white tracking-tighter">ERİŞİMİN KESİLDİ</h1>
        <p class="text-gray-500 mt-4 text-lg">Kuralları ihlal ettiğin için bu evrenden silindin.</p>
    </div>

    <aside class="w-80 sidebar flex flex-col">
        <div class="p-6 flex justify-between items-center">
            <div>
                <h1 class="font-black text-2xl tracking-tighter text-white">TR_CHAT <span class="text-indigo-500 italic">V6</span></h1>
                <div class="h-1 w-12 bg-indigo-600 rounded-full mt-1"></div>
            </div>
            <button onclick="addRoom()" class="w-10 h-10 bg-white/5 hover:bg-indigo-600 hover:text-white rounded-xl transition-all flex items-center justify-center text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
            </button>
        </div>

        <div class="px-4 flex-1 overflow-y-auto">
            <p class="text-[10px] font-black text-gray-600 uppercase tracking-[3px] mb-4 px-2">Kanallar</p>
            <div id="room-container" class="space-y-1"></div>
        </div>

        <div class="p-4 bg-black/20 border-t border-white/5">
            <div onclick="changeMyName()" class="flex items-center gap-4 p-3 rounded-2xl hover:bg-white/5 cursor-pointer transition-all group">
                <div id="my-avatar" class="w-12 h-12 rounded-2xl bg-indigo-600 flex items-center justify-center font-bold text-white shadow-lg shadow-indigo-600/20 text-xl">?</div>
                <div class="flex-1 overflow-hidden">
                    <div id="display-name" class="text-sm font-bold text-white truncate group-hover:text-indigo-400">Yükleniyor...</div>
                    <div id="display-role" class="text-[9px] text-gray-500 font-black uppercase tracking-widest">Üye</div>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col chat-bg">
        <header class="h-20 flex items-center px-10 glass-header justify-between z-10">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-indigo-500/10 flex items-center justify-center text-indigo-500">#</div>
                <div>
                    <h2 id="active-room-title" class="text-lg font-bold text-white">genel-sohbet</h2>
                    <p class="text-xs text-gray-500">Silmek için mesaja veya odaya çift tıkla.</p>
                </div>
            </div>
            <div id="status-tag" class="text-[10px] font-bold text-green-500 bg-green-500/10 px-3 py-1 rounded-full border border-green-500/20">SİSTEM ÇEVRİMİÇİ</div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-10 space-y-8 scroll-smooth"></div>

        <div class="p-8">
            <div class="max-w-5xl mx-auto relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-3xl blur opacity-10 group-focus-within:opacity-30 transition duration-1000"></div>
                <div class="relative bg-[#1a1d23] rounded-2xl flex items-center p-2 border border-white/5 shadow-2xl">
                    <input type="text" id="msg-inp" placeholder="Mesajını buraya bırak..." class="bg-transparent flex-1 outline-none px-6 text-sm py-4 text-white placeholder-gray-600">
                    <button onclick="sendMsg()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-10 py-4 rounded-xl font-bold shadow-lg shadow-indigo-600/40 transition-all active:scale-95 flex items-center gap-2">
                        GÖNDER
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBpCLRiS8pHlTgvVmNLH92u3VszvT25xPs",
            authDomain: "trchat-7bc26.firebaseapp.com",
            databaseURL: "https://trchat-7bc26-default-rtdb.firebaseio.com", 
            projectId: "trchat-7bc26"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const myUID = localStorage.getItem('v6_uid') || 'ID_' + Math.random().toString(36).substring(2, 12);
        localStorage.setItem('v6_uid', myUID);
        let myName = localStorage.getItem('v6_name') || "Kullanıcı";
        let currentRoom = "genel";

        function setupProfile() {
            const isAdmin = myName.toLowerCase() === "alper";
            document.getElementById('display-name').innerText = myName;
            document.getElementById('my-avatar').innerText = myName[0].toUpperCase();
            const roleEl = document.getElementById('display-role');
            if(isAdmin) {
                roleEl.innerText = "KURUCU";
                roleEl.className = "text-[9px] text-red-500 font-black tracking-widest";
            }
            return isAdmin;
        }

        function changeMyName() {
            const n = prompt("Yeni Kimliğin:");
            if(n) { localStorage.setItem('v6_name', n); location.reload(); }
        }

        // BAN KONTROL
        db.ref(`bans/${myUID}`).on('value', snap => {
            if(snap.val()) document.getElementById('ban-screen').style.display = 'flex';
        });

        // ODA İŞLEMLERİ
        function addRoom() {
            const n = prompt("Yeni Oda İsmi:");
            if(n) {
                const id = n.replace(/\s+/g, '-').toLowerCase();
                db.ref('rooms').child(id).set({ creator: myName, creatorUID: myUID });
            }
        }

        function deleteRoomAction(name, cUID) {
            const isAdmin = myName.toLowerCase() === "alper";
            if(isAdmin || cUID === myUID) {
                if(confirm(`${name} odasını ve tüm geçmişini silmek üzeresin. Onaylıyor musun?`)) {
                    db.ref('rooms').child(name).remove();
                    db.ref('msgs').child(name).remove();
                    if(currentRoom === name) switchRoom('genel');
                }
            }
        }

        db.ref('rooms').on('value', snap => {
            const cont = document.getElementById('room-container');
            cont.innerHTML = `
                <div onclick="switchRoom('genel')" class="room-btn flex items-center px-4 py-4 cursor-pointer text-gray-400 hover:text-white transition-all ${currentRoom==='genel'?'active-room':''}">
                    <span class="font-bold mr-3 opacity-30 text-xl">#</span>
                    <span class="font-bold text-sm">genel-sohbet</span>
                </div>`;
            snap.forEach(r => {
                const name = r.key;
                const d = r.val();
                cont.innerHTML += `
                    <div onclick="switchRoom('${name}')" 
                         ondblclick="deleteRoomAction('${name}', '${d.creatorUID}')"
                         class="room-btn group flex items-center px-4 py-4 cursor-pointer text-gray-400 hover:text-white transition-all ${currentRoom===name?'active-room':''}">
                        <span class="font-bold mr-3 opacity-30 text-xl">#</span>
                        <span class="font-bold text-sm flex-1 truncate">${name}</span>
                        <span class="text-[8px] opacity-0 group-hover:opacity-100 bg-white/10 px-2 py-1 rounded">SİL (ÇİFT TIK)</span>
                    </div>`;
            });
        });

        function switchRoom(n) {
            currentRoom = n;
            document.getElementById('active-room-title').innerText = n;
            loadMessages();
        }

        // MESAJ İŞLEMLERİ
        function sendMsg() {
            const inp = document.getElementById('msg-inp');
            if(!inp.value.trim()) return;
            db.ref('msgs').child(currentRoom).push({
                uid: myUID, name: myName, text: inp.value, ts: Date.now(),
                role: myName.toLowerCase() === 'alper' ? 'admin' : 'user'
            });
            inp.value = '';
        }

        function deleteMsgAction(mid, senderUID) {
            const isAdmin = myName.toLowerCase() === "alper";
            if(isAdmin || senderUID === myUID) {
                if(confirm("Bu mesaj sonsuza dek silinsin mi?")) {
                    db.ref('msgs').child(currentRoom).child(mid).remove();
                    loadMessages();
                }
            }
        }

        function banUserAction(uid, targetName) {
            if(confirm(`${targetName} kullanıcısını banlamak istediğine emin misin?`)) {
                db.ref('bans').child(uid).set(true);
            }
        }

        function loadMessages() {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            db.ref('msgs').child(currentRoom).off();
            db.ref('msgs').child(currentRoom).on('child_added', snap => {
                const m = snap.val();
                const mid = snap.key;
                const isAdmin = myName.toLowerCase() === "alper";

                const div = document.createElement('div');
                div.className = "flex gap-5 animate-msg group";
                div.innerHTML = `
                    <div class="w-14 h-14 rounded-2xl bg-[#1a1d23] flex-shrink-0 flex items-center justify-center font-bold text-indigo-500 border border-white/5 text-xl shadow-2xl">
                        ${m.name[0].toUpperCase()}
                    </div>
                    <div class="flex-1 space-y-2">
                        <div class="flex items-center gap-3">
                            <span class="font-black text-sm tracking-tight ${m.role==='admin'?'text-red-500':'text-indigo-400'}">${m.name}</span>
                            ${m.role === 'admin' ? '<span class="admin-tag text-[8px] text-white px-2 py-0.5 rounded-full font-black">KURUCU</span>' : ''}
                            <span class="text-[10px] text-gray-700 font-bold">${new Date(m.ts).toLocaleTimeString()}</span>
                        </div>
                        <div class="msg-bubble p-5 rounded-3xl rounded-tl-none" 
                             ondblclick="deleteMsgAction('${mid}', '${m.uid}')">
                            <p class="text-gray-300 text-sm leading-relaxed">${m.text}</p>
                            
                            ${isAdmin && m.uid !== myUID ? `
                                <button onclick="banUserAction('${m.uid}', '${m.name}')" class="absolute -right-12 top-0 opacity-0 group-hover:opacity-100 p-2 text-red-600 hover:scale-125 transition-all">
                                    🚫
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            });
        }

        setupProfile();
        loadMessages();
        document.getElementById('msg-inp').addEventListener('keypress', e => { if(e.key==='Enter') sendMsg(); });
    </script>
</body>
</html>
