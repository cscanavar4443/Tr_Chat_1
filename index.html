<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TR-Chat | Premium & Secure</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="server-name">
                <i class="fas fa-shield-halved"></i> TR-Chat Pro
            </div>
            
            <div class="channel-section">
                <div class="section-title">METİN KANALLARI</div>
                <div id="channelList">
                    <div class="channel active" onclick="switchChannel('genel')">
                        <i class="fas fa-hashtag"></i> genel
                    </div>
                </div>
            </div>

            <div class="user-footer">
                <div class="user-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="user-meta">
                    <span id="myNickDisplay" class="nick-text">Yükleniyor...</span>
                    <span class="status">Çevrimiçi</span>
                </div>
                <button class="icon-btn" onclick="openSettings()"><i class="fas fa-cog"></i></button>
            </div>
        </aside>

        <main class="chat-main">
            <header class="chat-header">
                <div class="header-info">
                    <i class="fas fa-hashtag"></i>
                    <h3 id="currentChannelName">genel</h3>
                </div>
                <div class="header-actions">
                    <button class="action-btn" onclick="createRoom()" title="Oda Oluştur">
                        <i class="fas fa-plus-circle"></i>
                    </button>
                </div>
            </header>

            <div id="messages" class="message-list">
                </div>

            <div class="input-container">
                <div class="input-box">
                    <button class="attach-btn"><i class="fas fa-circle-plus"></i></button>
                    <input type="text" id="msgInput" placeholder="Mesaj gönder..." autocomplete="off">
                    <div class="input-icons">
                        <i class="fas fa-gift"></i>
                        <i class="fas fa-sticky-note"></i>
                        <i class="fas fa-face-smile"></i>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Profil Ayarları</h2>
                <i class="fas fa-times" onclick="closeSettings()"></i>
            </div>
            <div class="modal-body">
                <label>Nickname Değiştir</label>
                <input type="text" id="newNick" placeholder="Yeni bir nick yazın...">
                <button class="save-btn" onclick="saveSettings()">Değişiklikleri Kaydet</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
