<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TR_CHAT | V6 CYBER FORTRESS PRO</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --neon-indigo: #6366f1; --neon-red: #ff0033; --cyber-black: #050608; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--cyber-black); color: #e2e8f0; overflow: hidden; }
        
        .cyber-panel { background: rgba(10, 12, 16, 0.9); backdrop-filter: blur(30px); border-bottom: 1px solid rgba(99, 102, 241, 0.1); }
        .sidebar { background: #08090b; border-right: 1px solid rgba(255,255,255,0.03); }
        
        .msg-bubble { 
            background: rgba(22, 26, 32, 0.6); 
            border: 1px solid rgba(255,255,255,0.03); 
            position: relative;
            transition: all 0.2s ease;
        }
        .msg-bubble:hover { border-color: var(--neon-indigo); background: rgba(30, 35, 45, 0.9); }

        .ban-screen { 
            position: fixed; inset: 0; background: radial-gradient(circle, #400 0%, #000 100%); 
            z-index: 99999; display: none; align-items: center; justify-content: center; flex-direction: column;
        }

        .admin-action-btn { 
            opacity: 0; transition: opacity 0.2s;
            background: rgba(0,0,0,0.5); padding: 2px 8px; rounded: 6px;
        }
        .msg-bubble:hover .admin-action-btn { opacity: 1; }

        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .banned-text { animation: pulse-red 2s infinite; color: #ff4444; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-indigo); border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex select-none" oncontextmenu="return false;">

    <div id="ban-screen" class="ban-screen">
        <div class="text-9xl mb-8">🚫</div>
        <h1 class="text-6xl font-black text-white tracking-tighter">ERIŞIM ENGELLENDI</h1>
        <p class="text-red-500 font-mono mt-4 text-xl tracking-[5px] uppercase">SECURITY PROTOCOL: IP_BLACKLISTED</p>
        <button onclick="location.reload()" class="mt-10 px-8 py-3 bg-white text-black font-bold rounded-full">SISTEMI YENIDEN TARA</button>
    </div>

    <aside class="w-80 sidebar flex flex-col z-20">
        <div class="p-8 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter text-white">FORTRESS <span class="text-indigo-500 text-sm">V6</span></h1>
            <button onclick="addRoom()" class="w-10 h-10 bg-indigo-600/10 hover:bg-indigo-600 text-white rounded-xl transition-all">＋</button>
        </div>

        <div class="flex-1 overflow-y-auto px-4 space-y-1" id="room-container">
            </div>

        <div class="p-6 border-t border-white/5 bg-black/40">
            <div onclick="changeMyName()" class="flex items-center gap-4 p-3 rounded-2xl hover:bg-white/5 cursor-pointer">
                <div id="my-avatar" class="w-12 h-12 rounded-2xl bg-indigo-600 flex items-center justify-center font-bold text-white shadow-lg">?</div>
                <div class="flex-1 overflow-hidden">
                    <div id="display-name" class="text-sm font-bold text-white truncate">Yükleniyor...</div>
                    <div id="display-role" class="text-[9px] text-indigo-400 font-black uppercase tracking-widest">Sistem Analizi...</div>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-[#0a0c10]">
        <header class="h-20 flex items-center px-10 cyber-panel justify-between z-10">
            <div class="flex items-center gap-4">
                <div class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></div>
                <h2 id="active-room-title" class="text-lg font-bold text-white tracking-tight">genel-sohbet</h2>
            </div>
            
            <div id="admin-tools" class="hidden flex gap-3">
                <button onclick="showBanList()" class="bg-red-600/20 hover:bg-red-600 border border-red-600/50 text-red-500 hover:text-white px-4 py-2 rounded-lg text-xs font-bold transition-all">BAN YÖNETİMİ</button>
            </div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-10 space-y-6"></div>

        <div class="p-8">
            <div class="max-w-4xl mx-auto bg-[#161a20] rounded-2xl flex items-center p-2 border border-white/5 focus-within:border-indigo-500/50 transition-all shadow-2xl">
                <input type="text" id="msg-inp" autocomplete="off" placeholder="Güvenli mesaj gönder..." class="bg-transparent flex-1 outline-none px-6 text-sm py-4 text-white">
                <button onclick="sendMsg()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-4 rounded-xl font-bold transition-all transform active:scale-95">GÖNDER</button>
            </div>
        </div>
    </main>

    <script>
        // --- CONFIG & INIT ---
        const firebaseConfig = {
            apiKey: "AIzaSyBpCLRiS8pHlTgvVmNLH92u3VszvT25xPs",
            authDomain: "trchat-7bc26.firebaseapp.com",
            databaseURL: "https://trchat-7bc26-default-rtdb.firebaseio.com", 
            projectId: "trchat-7bc26"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Fingerprint & Identity
        const myIP_ID = localStorage.getItem('v6_fprint') || 'USR-' + Math.random().toString(36).substring(2, 12).toUpperCase();
        localStorage.setItem('v6_fprint', myIP_ID);
        
        let myName = localStorage.getItem('v6_name') || "Anonim_" + Math.random().toString(10).substring(2, 5);
        let currentRoom = "genel";

        function isKurucu() { return myName.toLowerCase() === "alper"; }

        // --- GÜVENLİK ---
        function sanitize(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/'/g, "&#39;");
        }

        // Ban Kontrolü (Real-time)
        db.ref(`bans/${myIP_ID}`).on('value', snap => {
            if(snap.val()) document.getElementById('ban-screen').style.display = 'flex';
        });

        // --- ODA SİSTEMİ ---
        function addRoom() {
            const n = prompt("Yeni Kanal Adı:");
            if(n) {
                const id = sanitize(n).replace(/\s+/g, '-').toLowerCase();
                db.ref('rooms').child(id).set({ creator: myName, creatorIP: myIP_ID });
            }
        }

        db.ref('rooms').on('value', snap => {
            const cont = document.getElementById('room-container');
            cont.innerHTML = `<div onclick="switchRoom('genel')" class="p-4 mb-1 rounded-xl cursor-pointer transition-all ${currentRoom==='genel'?'bg-indigo-600/20 text-white border-l-4 border-indigo-600 shadow-lg':'text-gray-500 hover:bg-white/5'}"># genel-sohbet</div>`;
            snap.forEach(r => {
                const name = r.key;
                cont.innerHTML += `<div onclick="switchRoom('${name}')" ondblclick="deleteRoom('${name}', '${r.val().creatorIP}')" class="p-4 mb-1 rounded-xl cursor-pointer transition-all ${currentRoom===name?'bg-indigo-600/20 text-white border-l-4 border-indigo-600 shadow-lg':'text-gray-500 hover:bg-white/5'}"># ${name}</div>`;
            });
        });

        function switchRoom(n) { 
            currentRoom = n; 
            document.getElementById('active-room-title').innerText = n; 
            loadMessages(); 
        }

        function deleteRoom(name, cIP) {
            if(isKurucu() || cIP === myIP_ID) {
                if(confirm("Kanalı ve tüm verileri imha et?")) {
                    db.ref('rooms').child(name).remove();
                    db.ref('msgs').child(name).remove();
                }
            }
        }

        // --- MESAJ SİSTEMİ ---
        function sendMsg() {
            const inp = document.getElementById('msg-inp');
            const val = inp.value.trim();
            if(!val) return;

            db.ref('msgs').child(currentRoom).push({
                ip: myIP_ID,
                name: myName,
                text: sanitize(val),
                ts: Date.now(),
                role: isKurucu() ? 'admin' : 'user'
            });
            inp.value = '';
        }

        function loadMessages() {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            db.ref('msgs').child(currentRoom).off();
            db.ref('msgs').child(currentRoom).on('child_added', snap => {
                const m = snap.val();
                const mid = snap.key;
                const div = document.createElement('div');
                div.id = `msg-${mid}`;
                div.className = "flex gap-4 animate-in fade-in slide-in-from-left-2 duration-300";
                
                const isAdminMsg = m.role === 'admin';
                const isMyMsg = m.ip === myIP_ID;

                div.innerHTML = `
                    <div class="w-12 h-12 shrink-0 rounded-2xl bg-[#11141b] border border-white/5 flex items-center justify-center font-bold ${isAdminMsg?'text-red-500':'text-indigo-400'}">
                        ${m.name[0].toUpperCase()}
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-xs font-black ${isAdminMsg?'text-red-500':'text-gray-400'} uppercase tracking-tighter">${m.name}</span>
                            <span class="text-[10px] text-gray-700">${new Date(m.ts).toLocaleTimeString()}</span>
                        </div>
                        <div class="msg-bubble p-4 rounded-2xl rounded-tl-none group">
                            <p class="text-sm text-gray-200 leading-relaxed">${m.text}</p>
                            
                            <div class="mt-2 flex gap-2 admin-action-btn">
                                ${ (isKurucu() || isMyMsg) ? `<button onclick="deleteMsg('${mid}', '${m.ip}')" class="text-[10px] text-gray-500 hover:text-white">SİL</button>` : '' }
                                ${ (isKurucu() && !isMyMsg) ? `
                                    <button onclick="kickUser('${m.name}')" class="text-[10px] text-yellow-500 hover:text-white">KICK</button>
                                    <button onclick="banUser('${m.ip}')" class="text-[10px] text-red-500 hover:text-white font-bold">🔨 BAN</button>
                                ` : '' }
                            </div>
                        </div>
                    </div>
                `;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            });

            // Gerçek zamanlı silme takibi (Kurucu için)
            db.ref('msgs').child(currentRoom).on('child_removed', snap => {
                const el = document.getElementById(`msg-${snap.key}`);
                if(el) el.remove();
            });
        }

        // --- ADMIN FONKSIYONLARI ---
        function deleteMsg(mid, senderIP) {
            if(isKurucu()) {
                // Kurucu her yerden siler
                db.ref('msgs').child(currentRoom).child(mid).remove();
            } else if(senderIP === myIP_ID) {
                // Kullanıcı sadece kendi ekranından siler
                document.getElementById(`msg-${mid}`).style.display = 'none';
            }
        }

        function banUser(ip) {
            if(isKurucu() && confirm("Bu kullanıcıyı kalıcı olarak yasakla?")) {
                db.ref('bans').child(ip).set({ bannedBy: myName, date: Date.now() });
            }
        }

        function kickUser(name) {
            if(isKurucu()) {
                db.ref('msgs').child(currentRoom).push({
                    name: "SİSTEM",
                    text: `⚠️ ${name} sistemden atıldı.`,
                    ts: Date.now(),
                    role: 'admin'
                });
            }
        }

        function showBanList() {
            db.ref('bans').once('value', snap => {
                let list = "BANLANANLAR:\n";
                snap.forEach(b => { list += `- IP: ${b.key}\n`; });
                const target = prompt(list + "\nBanı kaldırılacak IP ID:");
                if(target) db.ref('bans').child(target).remove();
            });
        }

        // --- BAŞLATMA ---
        function changeMyName() {
            const n = prompt("Kod Adını Değiştir:");
            if(n) { localStorage.setItem('v6_name', sanitize(n)); location.reload(); }
        }

        document.getElementById('display-name').innerText = myName;
        document.getElementById('my-avatar').innerText = myName[0].toUpperCase();
        document.getElementById('display-role').innerText = isKurucu() ? "KURUCU / ROOT" : "OPERATÖR";
        if(isKurucu()) document.getElementById('admin-tools').classList.remove('hidden');

        document.getElementById('msg-inp').addEventListener('keypress', e => { if(e.key==='Enter') sendMsg(); });
        
        // F12 Koruması (Basit)
        document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false; };

        loadMessages();
    </script>
</body>
</html>
